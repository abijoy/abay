{% load static %}

<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
   <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

   <!-- Bootstrap CSS -->
   <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
   <link rel="stylesheet" type="text/css" href="{% static 'css/app.css' %}">

   <script src="{% static 'js/jquery-3.6.0.min.js' %}"></script>
   <script src="{% static 'js/jquery.waypoints.min.js' %}"></script>
   <script src="{% static 'js/infinite.min.js' %}"></script>
   <script src="{% static 'js/app.js' %}"></script>
	<title></title>
</head>
<body style="margin: 30px;">


	<div id="navbar" style="margin-bottom: 20px;">
		<nav class="navbar navbar-expand-lg navbar-light bg-light">

			<!-- add brand logo -->
			<a class="navbar-brand" href="{% url 'dashboard' %}">
				<img src="{% static '/media/logo.png' %}" class="d-inline-block align-top" alt="">
			</a>

			<!-- add navbar toggler for responsiveness -->
			<button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#nabarNav" aria-controls="nabarNav" aria-expanded="false" aria-label="Toggle navigation">
			  <span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="nabarNav">

				<!-- add nav items  -->
				<ul class="navbar-nav ml-auto">
					<li class="nav-item">
				      <!-- <a class="nav-link" href="#"></a> -->
				    </li>
				    <li class="nav-item">
				      <a class="nav-link" href="{% url 'add_product' %}">Add Item</a>
				    </li>
				    <li class="nav-item">
				    	<a class="nav-link" href="{% url 'logout' %}">Logout</a>
				    </li>
				    <li class="nav-item">
				    	<span class="nav-link" style="display: block; ">[ {{ user }} ]</span>
				    </li>
				 </ul>
			</div>

		</nav>
	</div>


	{% block content %}

	{% endblock %}






	<!-- Optional JavaScript -->
	<!-- jQuery first, then Popper.js, then Bootstrap JS -->


	
	<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
	<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
</body>
</html>
